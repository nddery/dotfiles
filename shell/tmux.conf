# Inspired in big part by:
# https://github.com/tangledhelix/dotfiles/blob/master/tmux.conf

unbind -n C-b
unbind -n C-a
set-option -g prefix C-a
bind-key C-a last-window

# Allows us to use C-a a <command> to send commands to a TMUX session inside
# another TMUX session
bind-key a send-prefix

###############################################################################
# General options

# Default termtype
# set -g default-terminal "tmux-256color"
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
# set -g default-terminal "screen-256color"
# set -ag terminal-overrides ",screen-256color:RGB"

# Ring the bell if any background window rang a bell
set -g bell-action any

# Watch for activity in background windows
setw -g monitor-activity on
set -g visual-activity on

# scrollback size
set -g history-limit 10000

# set first window to index 1 (not 0) to map more to the keyboard layout
set -g base-index 1
setw -g pane-base-index 1

# Allows for faster key repetition
set -s escape-time 100

set -g focus-events on

# When a session is destroyed (e.g. you close its last pane), switch to the
# most-recently-active remaining session instead of detaching / exiting tmux.
set -g detach-on-destroy off

###############################################################################
# Keymapping

# Vi copypaste mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."


###############################################################################
# Window management / moving around

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on

# auto window rename
set-window-option -g automatic-rename on

# Highlight active window
# set-window-option -g window-status-current-bg red


###############################################################################
# Pane management / moving around

# more natural split window bindings
bind-key - split-window -v
bind-key _ split-window -v
bind-key | split-window -h

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
# is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
#    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
is_vim="ps -o tty= -o state= -o comm= | \
  grep -iqE '^#{s|/dev/||:pane_tty} +[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
if-shell '[ $(echo "$(tmux -V | cut -d" " -f2 | tr -d "[:alpha:]") < 3.0" | bc) -eq 1  ]' \
  "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell '[ $(echo "$(tmux -V | cut -d" " -f2 | tr -d "[:alpha:]") >= 3.0" | bc) -eq 1  ]' \
  "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\' 'select-pane -l'"
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Bring back clear screen under tmux prefix
bind C-l send-keys 'C-l'


###############################################################################
# Mouse mode
set-option -g mouse on


###############################################################################
# sesh — session switcher
#
# Every new session and window gets a narrow session-list pane on the left
# (running shell/sesh-picker, symlinked to ~/.local/bin). Fuzzy-pick a session
# there to swap to it; Ctrl-l jumps to the main pane, Esc dismisses the picker,
# and <prefix> e brings it back.
set-hook -g session-created 'if-shell -F "#{==:#{window_panes},1}" "split-window -hbd -l 40 \"exec ~/.local/bin/sesh-picker\""'
set-hook -g after-new-window 'if-shell -F "#{==:#{window_panes},1}" "split-window -hbd -l 40 \"exec ~/.local/bin/sesh-picker\""'
# Close the window when the picker is the only pane left (e.g. you exited your
# work pane) instead of leaving the picker hanging on its own.
set-hook -g window-layout-changed 'if-shell -F "#{&&:#{==:#{window_panes},1},#{@sesh_picker}}" "kill-pane"'
# Refresh the picker's list and re-evaluate its cursor whenever focus moves.
# Sends f5, which sesh-picker binds to a reload of the current view plus a
# show/hide of its cursor bar based on whether it has focus. Focusing the picker
# → f5 straight to it (reload + show cursor). Focusing a work pane instead →
# refresh the on-screen picker(s) so the one you just left reloads and hides its
# cursor (fzf can't tell it lost focus on its own).
set-hook -g pane-focus-in 'if-shell -F "#{@sesh_picker}" "send-keys F5" "run-shell -b \"~/.local/bin/sesh-picker --refresh-all\""'
# Also refresh the on-screen picker(s) whenever a session appears or disappears,
# so the list stays live without a polling timer.
set-hook -ga session-created 'run-shell -b "~/.local/bin/sesh-picker --refresh-all"'
set-hook -g session-closed 'run-shell -b "~/.local/bin/sesh-picker --refresh-all"'
# ...and the moment a session rings the bell, so its 🔔 appears without waiting
# for the next focus.
set-hook -g alert-bell 'run-shell -b "~/.local/bin/sesh-picker --refresh-all"'
# When you switch into / open a session and would land on the picker, hop to the
# work pane beside it instead.
set-hook -g client-session-changed 'if-shell -F "#{@sesh_picker}" "select-pane -R"'
# A session opened by `sesh connect` is created detached, so its window is only
# default-size (80 cols) when session-created splits the picker at -l 40 — that's
# ~50%, not 40 cols. When we switch into the session the window grows to the real
# client size and tmux redistributes the extra width *proportionally*, so the
# picker stays a percentage. Re-pin it to a true 40 cols once the window is full
# size (on switch, and again on any terminal resize).
set-hook -ga client-session-changed 'run-shell -b "~/.local/bin/sesh-picker --resize-all"'
set-hook -g window-resized 'run-shell -b "~/.local/bin/sesh-picker --resize-all"'
bind-key e run-shell "~/.local/bin/sesh-picker --focus"


###########################################################################
# Color scheme
#
# Background-agnostic: only `default` (inherits the terminal's own bg/fg)
# and the 16 named ANSI colors are used. The terminal's theme remaps those
# names for light vs. dark, so this reads well on either background.

# status bar
set -g status-position bottom
set -g status-interval 60
set -g status-justify left
set -g status-style bg=default,fg=default

set -g status-left ''
set -g status-left-length 20

set -g status-right '#[fg=blue]#(uptime | rev | cut -d "," -f 1 | rev | cut -d " " -f 5) | #(uptime | cut -f 3-6 -d " " | cut -f 1 -d ",") | #(LC_ALL="fr_CA.UTF-8" date +%%a\ %%d\ %%b) | #(date +%%H:%%M) '
set -g status-right-length 50

# window status
setw -g window-status-format ' #I #W '
setw -g window-status-style fg=default
setw -g window-status-current-format ' #I #W '
setw -g window-status-current-style fg=blue,bold

# pane border
set -g pane-border-style fg=default
set -g pane-active-border-style fg=blue

# message text
set -g message-style fg=default,bold

# modes
setw -g clock-mode-colour blue
setw -g mode-style reverse

# bell
setw -g window-status-bell-style fg=red,bold
