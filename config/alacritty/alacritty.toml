
[bell]
animation = "EaseOutExpo"
duration = 0

[cursor]
style = "Block"
unfocused_hollow = true

[debug]
render_timer = false

[env]
TERM = "xterm-256color"

[font]
size = 16.0

[font.bold]
family = "CaskaydiaCove Nerd Font"

[font.glyph_offset]
x = 0
y = 0

[font.italic]
family = "CaskaydiaCove Nerd Font"

[font.normal]
family = "CaskaydiaCove Nerd Font"

[font.offset]
x = 1
y = 3

# Custom key bindings only. Alacritty 0.16 already ships sensible defaults
# for arrows, F-keys (incl. modifiers), Home/End, PageUp/Down, Insert/Delete,
# copy/paste, font sizing, and clear — so only the non-default ones live here.

# Shift+Enter / Ctrl+Enter -> CSI-u sequences (used by nvim & modern TUIs).
[[keyboard.bindings]]
chars = "\u001B[13;2u"
key = "Return"
mods = "Shift"

[[keyboard.bindings]]
chars = "\u001B[13;5u"
key = "Return"
mods = "Control"

# NumpadEnter -> newline.
[[keyboard.bindings]]
chars = "\n"
key = "NumpadEnter"

[mouse]
hide_when_typing = false

[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"

[scrolling]
history = 10000
multiplier = 3

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>"

[terminal.shell]
args = ["--login"]
program = "/bin/zsh"

[window]
decorations = "full"
dynamic_title = false
opacity = 1.0

[window.dimensions]
columns = 100
lines = 30

[window.padding]
x = 5
y = 5

[general]
live_config_reload = true

import = [
    "~/.config/alacritty/colors/dark.toml"
]

[terminal]
